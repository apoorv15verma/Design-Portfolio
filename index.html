<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Apoorv Verma — UI/UX Designer based in New Delhi. Available for Freelance & Full-Time." />
  <title>Apoorv Verma | UI/UX Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HOME VIEW ===== -->
  <div id="home-view">

    <!-- HERO -->
    <section class="hero">
      <div class="hero-cover">
        <div class="proj-hero-grid home-hero-grid">
          <div class="grid-line" style="--spk-delay:0s"></div>
          <div class="grid-line" style="--spk-delay:0.55s"></div>
          <div class="grid-line" style="--spk-delay:1.10s"></div>
          <div class="grid-line" style="--spk-delay:1.65s"></div>
          <div class="grid-line" style="--spk-delay:2.20s"></div>
          <div class="grid-line" style="--spk-delay:2.75s"></div>
          <div class="grid-line" style="--spk-delay:3.30s"></div>
          <div class="grid-line" style="--spk-delay:3.85s"></div>
        </div>
      </div>
    </section>

    <!-- CONTENT WRAPPER: Sidebar + Main -->
    <div class="content-wrapper">

      <!-- SIDEBAR (sticky, no independent scroll) -->
      <aside class="sidebar-col">
        <div class="sidebar-sticky">

          <!-- Avatar — overlaps cover bottom edge -->
          <div class="sidebar-avatar-wrap">
            <div class="sidebar-avatar">
              <img src="images/avatar.webp" alt="Apoorv Verma"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
              <div class="sidebar-avatar-fallback">AV</div>
            </div>
          </div>

          <!-- Profile info -->
          <div class="sidebar-info">
            <h2 class="sidebar-name">Apoorv Verma</h2>
            <p class="sidebar-role">UI/UX Designer</p>

            <div class="sidebar-meta">
              <span class="info-row">
                <!-- Iconsax: Building (linear) -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path stroke-width="1.5" d="M12.5 22H4.08c-1.16 0-2.11-.93-2.11-2.07V5.09c0-2.62 1.95-3.81 4.34-2.64l4.44 2.18c.96.47 1.75 1.72 1.75 2.78V22ZM21.97 15.06v3.78c0 2.16-1 3.16-3.16 3.16H12.5V10.42l.47.1 4.5 1.01 2.03.45c1.32.29 2.4.97 2.46 2.89.01.06.01.12.01.19ZM5.5 9h3.47M5.5 13h3.47"/><path stroke-width="1.5" d="M17.47 11.53v3.22c0 1.24-1.01 2.25-2.25 2.25s-2.25-1.01-2.25-2.25v-4.23l4.5 1.01Z"/></svg>
                Webority Technologies
              </span>
              <span class="info-row">
                <!-- Iconsax: Location (linear) -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 13.43a3.12 3.12 0 1 0 0-6.24 3.12 3.12 0 0 0 0 6.24z"/>
                  <path d="M3.62 8.49c1.97-8.66 14.8-8.65 16.76.01 1.15 5.08-2.01 9.38-4.78 12.04a5.19 5.19 0 0 1-7.21 0C5.63 17.87 2.47 13.57 3.62 8.49z"/>
                </svg>
                New Delhi, India
              </span>
              <a href="mailto:apoorv15verma@gmail.com" class="info-row info-link">
                <!-- Iconsax: Sms (linear) -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 20.5H7c-3 0-5-1.5-5-5v-7c0-3.5 2-5 5-5h10c3 0 5 1.5 5 5v7c0 3.5-2 5-5 5z"/>
                  <path d="M17 9l-3.13 2.5c-1.03.82-2.72.82-3.75 0L7 9"/>
                </svg>
                <span>apoorv15verma@gmail.com</span>
              </a>
            </div>

            <div class="sidebar-actions">
              <a href="resume.pdf" target="_blank" class="btn btn-primary sidebar-btn">Resume</a>
            </div>
          </div>

        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <div class="main-col">

        <!-- Tab Navigation -->
        <nav class="content-nav" id="main-nav">
          <div class="content-nav-inner" id="tab-buttons">
            <!-- Populated by JS based on screen size -->
          </div>
          <div class="nav-indicator-bar"></div>
        </nav>

        <!-- Tab Panels -->
        <div id="panel-work" class="tab-panel"></div>
        <div id="panel-info" class="tab-panel hidden"></div>
        <div id="panel-experience" class="tab-panel hidden"></div>

      </div><!-- /main-col -->

    </div><!-- /content-wrapper -->

    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-left">
          <span class="footer-logo">Apoorv Verma</span>
          <span class="footer-tagline">UI/UX Designer · New Delhi, India</span>
        </div>
        <div class="footer-center">
          <p class="footer-copy">&copy; 2024 Apoorv Verma. All rights reserved.</p>
        </div>
        <div class="footer-right">
          <a href="https://linkedin.com/in/apoorv15verma" target="_blank" class="footer-link">LinkedIn</a>
          <a href="https://apoorv15verma.github.io/portfolio/" target="_blank" class="footer-link">GitHub</a>
          <a href="mailto:apoorv@example.com" class="footer-link">Email</a>
        </div>
      </div>
    </footer>

  </div><!-- /home-view -->

  <!-- ===== PROJECT DETAILS VIEW ===== -->
  <div id="project-view" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
